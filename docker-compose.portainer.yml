version: "3.8"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      args:
        INSTALL_AUDIO_DEPS: "false"
    restart: unless-stopped
    ports:
      - "5001:5001"
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  odoo-19:
    image: odoo:19.0
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      AUTO_INIT: ${AUTO_INIT:-false}
      INIT_DB_NAME: ${INIT_DB_NAME:-}
      INIT_MODULES: ${INIT_MODULES:-}
      INIT_MODULE_GITS: ${INIT_MODULE_GITS:-}
    ports:
      - "8071:8069"
    volumes:
      - ./addons/19:/mnt/extra-addons
      - ./bluewave_theme:/mnt/extra-addons/bluewave_theme
      - ./deployable_brand_theme:/mnt/brand_theme
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - odoo19_data:/var/lib/odoo
    depends_on:
      - db

volumes:
  db_data:
  odoo19_data:
