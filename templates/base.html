<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zisanda-hub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/greenmotive.css">
    <link rel="stylesheet" href="/static/css/agent-theme.css">
    <link rel="stylesheet" href="/static/css/themes.css">
    <link rel="stylesheet" href="/static/css/agent-dark.css" id="agent-dark-css">
    <link rel="stylesheet" href="/static/css/landing.css">
    {% block extra_head %}{% endblock %}
</head>
<body{% if request.path in ['/settings','/manage_apps'] %} class="manage-apps"{% endif %}>
    <nav class="site-nav">
        <div class="container">
            <a class="logo" href="/">Zisanda‑hub</a>
            <ul class="links">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/manage_apps">Manage Apps</a></li>
                <li><a href="/settings">Settings</a></li>
                {% block nav_links %}{% endblock %}
            </ul>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
