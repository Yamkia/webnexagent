version: "3.8"

services:
  web:
    # remove local source bind-mounts for production — the image contains the app
    # Use production env file for container env variables
    env_file: .env.production
    volumes: []

volumes:
  # named volumes (db / odoo) continue to be managed by compose
  db_data: {}
  odoo17_data: {}
  odoo18_data: {}
  odoo19_data: {}
