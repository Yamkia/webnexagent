    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/draggable.js"></script>
    {% if enabled_apps.social_media %}
    <script src="/static/js/instagram_manager.js"></script>
    <script src="/static/js/instagram_suite.js"></script>
    {% endif %}
    <script src="/static/js/app.js"></script>
    <script>
        // Theme & brand selector: persist in localStorage and set attributes on root/body
        (function(){
            const btn = document.getElementById('theme-toggle');
            const sel = document.getElementById('theme-select');
            const root = document.documentElement;
            const body = document.body;
            const DARK_KEY = 'zisanda_theme';
            const BRAND_KEY = 'zisanda_brand';

            function applyTheme(theme){
                if(theme === 'dark'){
                    root.setAttribute('data-theme','dark');
                    body.setAttribute('data-theme','dark');
                    btn.textContent = 'Light';
                } else {
                    root.removeAttribute('data-theme');
                    body.removeAttribute('data-theme');
                    btn.textContent = 'Dark';
                }
            }

            function applyBrand(brand){
                if(!brand || brand === 'default'){
                    root.removeAttribute('data-brand');
                    body.removeAttribute('data-brand');
                    sel.value = 'default';
                    return;
                }
                root.setAttribute('data-brand', brand);
                body.setAttribute('data-brand', brand);
                sel.value = brand;
            }

            // load saved settings
            const savedTheme = localStorage.getItem(DARK_KEY) || 'light';
            const savedBrand = localStorage.getItem(BRAND_KEY) || 'default';
            applyTheme(savedTheme);
            applyBrand(savedBrand);

            // interactions
            btn.addEventListener('click', ()=>{
                const current = document.body.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
                const next = current === 'dark' ? 'light' : 'dark';
                localStorage.setItem(DARK_KEY, next);
                applyTheme(next);
            });

            sel.addEventListener('change', (e)=>{
                const brand = e.target.value;
                localStorage.setItem(BRAND_KEY, brand);
                applyBrand(brand);
            });
        })();
    </script>
</body>
</html>
